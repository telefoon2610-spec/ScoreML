<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Score Tracker</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: auto; padding: 20px; }
    input, select, button { margin: 5px; padding: 8px; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 8px; text-align: center; }
    h2 { margin-top: 30px; }
  </style>
</head>
<body>

<h1>🎮 Score Tracker</h1>

<label>Spel:</label>
<select id="game">
  <option>Clever 1</option>
  <option>Clever 2</option>
  <option>Clever 3</option>
  <option>Clever 4</option>
  <option>Clever D</option>
  <option>Keer op Keer 1</option>
  <option>Keer op Keer 2</option>
  <option>Keer op Keer 3</option>
  <option>Keer op Keer D</option>
</select>

<br>

<label>Winnaar:</label>
<select id="winner">
  <option value="M">M</option>
  <option value="L">L</option>
  <option value="draw">Gelijkspel</option>
</select>

<br>

<label>Punten M:</label>
<input type="number" id="scoreM">

<label>Punten L:</label>
<input type="number" id="scoreL">

<br>

<button onclick="addResult()">Opslaan</button>

<h2>📊 Resultaten</h2>
<table id="table"></table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwEUHd7L8Nwbv_Ike3q-qUk1L9LFKbc0yVddoeQxGXy6vOHGQpJ8Vhckmm9TH2DbGr5/exec";

async function addResult() {
  const data = {
    game: document.getElementById("game").value,
    winner: document.getElementById("winner").value,
    scoreM: document.getElementById("scoreM").value,
    scoreL: document.getElementById("scoreL").value
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  loadData();
}

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = `
    <tr>
      <th>Spel</th>
      <th>Winnaar</th>
      <th>M</th>
      <th>L</th>
    </tr>
  `;

  let rows = data.slice(1); // skip header

  rows.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td>${r[3]}</td>
      </tr>
    `;
  });
}

loadData();

</script>

</body>
</html>
