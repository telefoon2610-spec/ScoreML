<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Scorebord L vs M</title>

<style>
  body { font-family: Arial; max-width: 800px; margin: 20px auto; }
  h1 { text-align: center; }

  .card {
    border: 1px solid #ddd;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
  }

  select, input, button {
    padding: 6px;
    margin: 4px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
  }

  .muted {
    color: gray;
    font-size: 12px;
  }
</style>
</head>

<body>

<h1>Scorebord L vs M</h1>

<!-- INPUT -->
<div class="card">
  <h3>Nieuwe game</h3>

  <select id="gameSelect"></select>

  <select id="winner">
    <option value="L">L wint</option>
    <option value="M">M wint</option>
    <option value="Gelijk">Gelijk</option>
  </select>

  <input type="number" id="scoreL" placeholder="Score L">
  <input type="number" id="scoreM" placeholder="Score M">

  <button onclick="addGame()">Opslaan</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard"></div>

<!-- HISTORY -->
<div class="card">
  <h3>Geschiedenis (kort)</h3>
  <div id="history"></div>
</div>

<script>

const games = [
  "Clever 1","Clever 2","Clever 3","Clever 4","Clever D",
  "Keer op keer 1","Keer op keer 2","Keer op keer 3","Keer op keer 4",
  "Locus","Wingspan","Wingspan 2v2"
];

let results = JSON.parse(localStorage.getItem("results") || "[]");

// dropdown vullen
const gameSelect = document.getElementById("gameSelect");
games.forEach(g => {
  const opt = document.createElement("option");
  opt.value = g;
  opt.textContent = g;
  gameSelect.appendChild(opt);
});

function addGame() {
  results.push({
    game: gameSelect.value,
    winner: document.getElementById("winner").value,
    scoreL: Number(document.getElementById("scoreL").value || 0),
    scoreM: Number(document.getElementById("scoreM").value || 0)
  });

  localStorage.setItem("results", JSON.stringify(results));
  render();
}

function render() {

  let L = 0, M = 0, D = 0;

  results.forEach(r => {
    if (r.winner === "L") L++;
    else if (r.winner === "M") M++;
    else D++;
  });

  // DASHBOARD
  document.getElementById("dashboard").innerHTML = `
    <div class="card">
      <h3>Overzicht</h3>
      <div class="row"><span>Totaal gespeeld</span><b>${results.length}</b></div>
      <div class="row"><span>Wins L</span><b>${L}</b></div>
      <div class="row"><span>Wins M</span><b>${M}</b></div>
      <div class="row"><span>Gelijk</span><b>${D}</b></div>
    </div>
  `;

  // HISTORY (super compact)
  document.getElementById("history").innerHTML =
    results.length === 0
      ? "<div class='muted'>Nog geen games gespeeld</div>"
      : results.map(r => `
          <div class="row">
            <span>${r.game}</span>
            <span>${r.scoreL}-${r.scoreM}</span>
            <b>${r.winner}</b>
          </div>
        `).join("");
}

render();

</script>

</body>
</html>
