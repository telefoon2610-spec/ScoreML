<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Scorebord</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 20px auto; }
    input, select { margin: 5px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h1>Scorebord L vs M</h1>

<h2>Nieuwe game</h2>

<select id="gameSelect"></select><br>

<label>Winnaar:</label>
<select id="winner">
  <option value="L">L</option>
  <option value="M">M</option>
  <option value="Gelijk">Gelijk</option>
</select><br>

<label>Score L:</label>
<input type="number" id="scoreL">

<label>Score M:</label>
<input type="number" id="scoreM"><br>

<button onclick="addGame()">Opslaan</button>

<h2>Statistieken</h2>
<div id="stats"></div>

<h2>Geschiedenis</h2>
<div id="history"></div>

<script>
const games = [
  "Clever 1","Clever 2","Clever 3","Clever 4","Clever D",
  "Keer op keer 1","Keer op keer 2","Keer op keer 3","Keer op keer 4",
  "Locus","Wingspan","Wingspan 2v2"
];

let results = JSON.parse(localStorage.getItem("results") || "[]");

const gameSelect = document.getElementById("gameSelect");
games.forEach(g => {
  const opt = document.createElement("option");
  opt.value = g;
  opt.textContent = g;
  gameSelect.appendChild(opt);
});

function addGame() {
  const entry = {
    game: gameSelect.value,
    winner: document.getElementById("winner").value,
    scoreL: Number(document.getElementById("scoreL").value),
    scoreM: Number(document.getElementById("scoreM").value),
    date: new Date().toISOString().slice(0,10)
  };

  results.push(entry);
  localStorage.setItem("results", JSON.stringify(results));

  render();
}

function render() {
  let winsL = 0, winsM = 0, draw = 0;

  results.forEach(r => {
    if (r.winner === "L") winsL++;
    else if (r.winner === "M") winsM++;
    else draw++;
  });

  document.getElementById("stats").innerHTML = `
    <div class="card">
      <b>Totaal gespeeld:</b> ${results.length}<br>
      <b>Wins L:</b> ${winsL}<br>
      <b>Wins M:</b> ${winsM}<br>
      <b>Gelijk:</b> ${draw}
    </div>
  `;

  document.getElementById("history").innerHTML = results
    .slice().reverse()
    .map(r => `
      <div class="card">
        <b>${r.game}</b><br>
        ${r.scoreL} - ${r.scoreM}<br>
        Winnaar: ${r.winner}<br>
        <small>${r.date}</small>
      </div>
    `).join("");
}

render();
</script>

</body>
</html>
