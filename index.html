<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Score Tracker</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    input, select, button { margin: 5px; padding: 6px; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 8px; text-align: center; }
    h1, h2 { margin-top: 30px; }
  </style>
</head>
<body>

<h1>🎮 Score Tracker</h1>

<label>Spel:</label>
<select id="game">
  <optgroup label="Clever">
    <option>Clever 1</option>
    <option>Clever 2</option>
    <option>Clever 3</option>
    <option>Clever 4</option>
    <option>Clever D</option>
  </optgroup>

  <optgroup label="Keer op Keer">
    <option>Keer op Keer 1</option>
    <option>Keer op Keer 2</option>
    <option>Keer op Keer 3</option>
    <option>Keer op Keer D</option>
  </optgroup>
</select>

<br>

<label>Winnaar:</label>
<select id="winner">
  <option value="M">M</option>
  <option value="L">L</option>
  <option value="draw">Gelijkspel</option>
</select>

<br>

<label>Punten M:</label>
<input type="number" id="scoreM">

<label>Punten L:</label>
<input type="number" id="scoreL">

<br>

<button onclick="addResult()">Opslaan</button>

<h2>📊 Totaal</h2>
<p id="total"></p>

<h2>📋 Resultaten</h2>
<table id="results">
  <tr>
    <th>Spel</th>
    <th>Winnaar</th>
    <th>M</th>
    <th>L</th>
  </tr>
</table>

<h2>📈 Per spel</h2>
<div id="perGame"></div>

<script>
let results = JSON.parse(localStorage.getItem("results")) || [];

function addResult() {
  const game = document.getElementById("game").value;
  const winner = document.getElementById("winner").value;
  const scoreM = document.getElementById("scoreM").value;
  const scoreL = document.getElementById("scoreL").value;

  results.push({ game, winner, scoreM, scoreL });
  localStorage.setItem("results", JSON.stringify(results));

  render();
}

function render() {
  const table = document.getElementById("results");
  table.innerHTML = `
    <tr>
      <th>Spel</th><th>Winnaar</th><th>M</th><th>L</th>
    </tr>
  `;

  let winsM = 0;
  let winsL = 0;
  let perGameStats = {};

  results.forEach(r => {
    // totaal
    if (r.winner === "M") winsM++;
    if (r.winner === "L") winsL++;

    // tabel
    table.innerHTML += `
      <tr>
        <td>${r.game}</td>
        <td>${r.winner === "draw" ? "Gelijkspel" : r.winner}</td>
        <td>${r.scoreM}</td>
        <td>${r.scoreL}</td>
      </tr>
    `;

    // per spel stats
    if (!perGameStats[r.game]) {
      perGameStats[r.game] = { M: 0, L: 0, draw: 0 };
    }

    perGameStats[r.game][r.winner]++;
  });

  document.getElementById("total").innerText =
    `M: ${winsM} wins | L: ${winsL} wins`;

  // per spel renderen
  let perGameHTML = "";
  for (let game in perGameStats) {
    const g = perGameStats[game];
    perGameHTML += `<p><strong>${game}</strong>: M ${g.M} - L ${g.L} (gelijk: ${g.draw})</p>`;
  }

  document.getElementById("perGame").innerHTML = perGameHTML;
}

render();
</script>

</body>
</html>
